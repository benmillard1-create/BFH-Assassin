<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#07111f"><title>BFH Assassin</title><link rel="stylesheet" href="styles.css"></head><body><main class="shell"><header class="brand"><div class="logo">🎯</div><div><h1>BFH Assassin</h1><p>Family holiday mission game</p></div></header><section id="message" class="message hidden"></section><section id="homeView"><div class="card hero"><span class="eyebrow">CLASSIFIED ACCESS</span><h2>Choose your operation</h2><button id="showCreateBtn" class="primary">Create game</button><button id="showJoinBtn" class="secondary">Join game</button></div></section><section id="createView" class="hidden"><div class="card"><button class="back" data-back>← Back</button><span class="eyebrow">HOST CONTROL</span><h2>Create a game</h2><label>Your name</label><input id="hostName" maxlength="40" placeholder="e.g. Dad"><button id="createGameBtn" class="primary">Create game</button></div></section><section id="joinView" class="hidden"><div class="card"><button class="back" data-back>← Back</button><span class="eyebrow">FIELD AGENT</span><h2>Join a game</h2><label>Game code</label><input id="joinCode" maxlength="6" placeholder="ABC123"><label>Your name</label><input id="playerName" maxlength="40" placeholder="e.g. Sarah"><button id="joinGameBtn" class="primary">Join game</button></div></section><section id="lobbyView" class="hidden"><div class="card"><div class="row"><div><span class="eyebrow">WAITING ROOM</span><h2>BFH Assassin</h2></div><span id="roleBadge" class="badge">PLAYER</span></div><p class="muted">Share this code:</p><button id="copyCodeBtn" class="code"><span id="lobbyCode">------</span><small>Tap to copy</small></button><hr><div class="row"><h3>Agents joined</h3><span id="playerCount">0</span></div><ul id="playerList"></ul><p id="waitingText" class="muted">Waiting for the host to begin…</p><button id="startGameBtn" class="primary hidden">Start game</button><button id="leaveGameBtn" class="secondary danger">Leave lobby</button></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></body></html>
